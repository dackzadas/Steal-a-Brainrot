<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
color:white;
background:url('https://tr.rbxcdn.com/180DAY-f85a85c43773ad29a38d707810e946df/768/432/Image/Webp/noFilter') center/cover no-repeat fixed;
}

/* overlay */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.8),rgba(0,0,0,0.95));
z-index:-1;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 30px;
}

/* BOTÃO ADMIN MELHORADO */
.admin-btn{
background:rgba(255,123,0,0.15);
border:1px solid rgba(255,123,0,0.4);
backdrop-filter:blur(10px);
color:#ff7b00;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.admin-btn:hover{
background:#ff7b00;
color:black;
box-shadow:0 0 15px #ff7b00;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal.active{display:flex}

/* LOGIN CARD CENTRAL */
.login-box{
width:280px;
background:#111;
padding:25px;
border-radius:16px;
text-align:center;
box-shadow:0 0 25px #000;
}

.login-box h2{
margin-bottom:15px;
color:#ff7b00;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#ff7b00;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
display:none;
width:800px;
height:500px;
background:#0d0d0d;
border-radius:20px;
overflow:hidden;
}

.sidebar{
width:180px;
background:#111;
padding:15px;
float:left;
height:100%;
}

.sidebar button{
display:block;
width:100%;
margin-bottom:10px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.content{
margin-left:180px;
padding:20px;
}

.preview{
height:120px;
background:#111;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:center;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff7b00;
color:black;
padding:10px 20px;
border-radius:20px;
opacity:0;
transition:0.3s;
}
.toast.show{opacity:1}

</style>
</head>

<body>

<header>
<h2>🧠 Brainrot</h2>
<button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
</header>

<div class="container" id="petList"></div>

<!-- ADMIN -->
<div class="modal" id="adminModal">

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h2>Acesso Administrador</h2>
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Acessar</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
<button onclick="openTab('pets')">Pets</button>
<button onclick="openTab('cats')">Categorias</button>
<button onclick="toggleAdmin()">Fechar</button>
</div>

<div class="content">

<div id="pets">
<input id="name" placeholder="Nome">
<input id="image" placeholder="URL">
<input type="file" onchange="uploadImage(event)">
<div class="preview" id="preview">Preview</div>
<button onclick="addPet()">Adicionar</button>
</div>

<div id="cats" style="display:none">
<input id="newCat" placeholder="Nova categoria">
<button onclick="addCategory()">Adicionar</button>
</div>

</div>
</div>

</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcc_rXycOtgH9P3Hn5PgOWHP6sLw2_84s",
  authDomain: "central-index.firebaseapp.com",
  projectId: "central-index",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD="fb140715";

/* UI */
function showToast(msg){
toast.innerText=msg;
toast.classList.add('show');
setTimeout(()=>toast.classList.remove('show'),2500);
}

function toggleAdmin(){
adminModal.classList.toggle('active');
}

/* LOGIN */
function login(){
if(password.value===ADMIN_PASSWORD){
loginBox.style.display='none';
dashboard.style.display='block';
showToast("Acesso liberado");
}else showToast("Senha incorreta");
}

/* FIREBASE ADD */
function addPet(){
let nameVal=name.value;
let img=image.value;

if(!nameVal||!img)return showToast("Preencha tudo");

db.collection("pets").add({name:nameVal,image:img});

showToast("Salvo online 🚀");
}

/* LOAD */
db.collection("pets").onSnapshot(snapshot=>{
petList.innerHTML="";
snapshot.forEach(doc=>{
let p=doc.data();
let card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="${p.image}"><h3>${p.name}</h3>`;
petList.appendChild(card);
});
});

/* upload */
function uploadImage(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>preview.innerHTML=`<img src="${reader.result}">`;
reader.readAsDataURL(file);
}

/* tabs */
function openTab(tab){
document.querySelectorAll('.content > div').forEach(d=>d.style.display='none');
document.getElementById(tab).style.display='block';
}
</script>

</body>
</html>
