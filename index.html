<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
color:white;
background:url('https://tr.rbxcdn.com/180DAY-f85a85c43773ad29a38d707810e946df/768/432/Image/Webp/noFilter') center/cover no-repeat fixed;
overflow-x:hidden;
}

/* overlay + animação */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
radial-gradient(circle at center, rgba(255,123,0,0.2), transparent 70%);
animation:bgMove 10s infinite alternate;
z-index:-1;
}

@keyframes bgMove{
0%{transform:scale(1)}
100%{transform:scale(1.05)}
}

/* partículas */
.particles{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#ff7b00;
border-radius:50%;
opacity:0.6;
box-shadow:0 0 10px #ff7b00;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px 30px;
}

.logo{
color:#ff7b00;
font-size:20px;
}

.admin-btn{
background:#ff7b00;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

/* HERO */
.hero{text-align:center;padding:80px 20px}
.hero h1 span{color:#ff7b00}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
border-radius:14px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff7b0030;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
z-index:9999;
}

.modal.active{display:flex}

/* dashboard */
.dashboard{
margin:auto;
width:820px;
height:520px;
display:flex;
background:#0d0d0d;
border-radius:20px;
overflow:hidden;
position:relative;
}

/* CLOSE X */
.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
color:#ff7b00;
}

/* SIDEBAR */
.sidebar{
width:200px;
background:#111;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
background:none;
border:none;
color:white;
padding:10px;
cursor:pointer;
text-align:left;
border-radius:8px;
}

.sidebar .active{
background:#ff7b00;
color:black;
}

/* CONTENT */
.content{
flex:1;
padding:20px;
}

/* FORM */
input,select{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:white;
margin-bottom:10px;
}

button.action{
background:#ff7b00;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* PREVIEW */
.preview{
height:120px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
overflow:hidden;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff7b00;
color:black;
padding:12px 25px;
border-radius:30px;
opacity:0;
transition:0.4s;
z-index:99999;
}
.toast.show{opacity:1}

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<header>
<div class="logo">🧠 BRAINROT</div>
<button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
</header>

<div class="hero">
<h1>Capture todos os <span>Brainrots</span></h1>
</div>

<div class="container" id="petList"></div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="dashboard">

<div class="close-btn" onclick="toggleAdmin()">✖</div>

<div class="sidebar" id="sidebar" style="display:none;">
<button onclick="openTab('petsTab')" class="active">Pets</button>
<button onclick="openTab('catTab')">Categorias</button>
</div>

<div class="content">

<!-- LOGIN -->
<div id="loginTab">
<input type="password" id="password" placeholder="Senha">
<button class="action" onclick="login()">Entrar</button>
</div>

<!-- PETS -->
<div id="petsTab" style="display:none">
<input id="name" placeholder="Nome">
<input id="imageURL" placeholder="URL da imagem" oninput="previewURL()">
<input type="file" onchange="uploadImage(event)">
<div class="preview" id="preview">Preview</div>
<select id="category"></select>
<button class="action" onclick="addPet()">Adicionar</button>
</div>

<!-- CATEGORIAS -->
<div id="catTab" style="display:none">
<input id="newCategory" placeholder="Nova categoria">
<button class="action" onclick="addCategory()">Adicionar</button>
</div>

</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD="fb140715";
let isLogged=false;

let pets=[];
let categories=["Todos"];

function showToast(msg){
toast.innerText=msg;
toast.classList.add('show');
setTimeout(()=>toast.classList.remove('show'),2500);
}

function toggleAdmin(){
adminModal.classList.toggle('active');
}

function login(){
if(password.value===ADMIN_PASSWORD){
isLogged=true;
showToast("Logado com sucesso");
loginTab.style.display='none';
sidebar.style.display='flex';
openTab('petsTab');
}else showToast("Senha incorreta");
}

function openTab(id){
document.querySelectorAll('.content > div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';

document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

function previewURL(){
preview.innerHTML=`<img src="${imageURL.value}">`;
}

function uploadImage(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>preview.innerHTML=`<img src="${reader.result}">`;
reader.readAsDataURL(file);
}

function addPet(){
if(!name.value)return showToast("Preencha o nome");
pets.push({name:name.value,image:imageURL.value});
render();
showToast("Adicionado!");
}

function addCategory(){
categories.push(newCategory.value);
showToast("Categoria criada");
}

function render(){
petList.innerHTML='';
pets.forEach(p=>{
let card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="${p.image}"><h3>${p.name}</h3>`;
petList.appendChild(card);
});
}

/* partículas */
for(let i=0;i<40;i++){
let p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*100+'%';
p.style.animationDuration=(6+Math.random()*6)+'s';
particles.appendChild(p);
}

render();
</script>

</body>
</html>
