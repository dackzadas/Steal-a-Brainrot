<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
color:white;
background:url('https://upload.wikimedia.org/wikipedia/en/7/77/Steal_a_Brainrot_thumbnail.webp') center/cover no-repeat fixed;
}

body::before{
content:"";
position:fixed;
width:100%;height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.95));
z-index:-1;
}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 30px;
}

.logo{
font-size:20px;
color:#ff7b00;
}

.admin-btn{
background:rgba(255,255,255,0.1);
border:none;padding:8px 12px;border-radius:8px;color:white;cursor:pointer;
}

.hero{
text-align:center;
padding:80px 20px 40px;
}

.hero h1{
font-size:48px;
font-weight:700;
}

.hero span{color:#ff7b00}

.count{
margin-top:10px;
opacity:0.8;
}

.tabs{
display:flex;justify-content:center;gap:10px;margin-top:25px;flex-wrap:wrap;
}

.tabs button{
padding:8px 14px;border-radius:20px;border:none;
background:rgba(255,255,255,0.08);
color:white;cursor:pointer;
transition:0.2s;
}

.tabs button:hover{
background:rgba(255,255,255,0.2);
}

.active{
background:#ff7b00 !important;
color:black;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;padding:40px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;height:150px;object-fit:cover;
}

.card h3{
padding:10px;font-size:14px;
}

.remove{
background:red;border:none;width:100%;padding:8px;color:white;cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal.active{
display:flex;
}

.modal-content{
background:#111;
padding:20px;border-radius:12px;width:300px;
display:flex;flex-direction:column;gap:10px;
}

input,select,button{
padding:10px;border:none;border-radius:8px;
}

button{cursor:pointer;background:#ff7b00;color:black}

</style>
</head>

<body>

<header>
<div class="logo">🧠 BRAINROT</div>
<button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
</header>

<div class="hero">
<h1>Capture todos os <span>Brainrots</span></h1>
<div class="count" id="count"></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="container" id="petList"></div>

<div class="modal" id="adminModal">
<div class="modal-content">
<h3>Painel Admin</h3>
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<div id="panel" style="display:none;">
<input id="name" placeholder="Nome">
<input id="image" placeholder="Imagem URL">
<select id="category">
<option>Halloween</option>
<option>Aquática</option>
<option>Natalina</option>
<option>Taco</option>
<option>Easter</option>
</select>
<button onclick="addPet()">Adicionar</button>
</div>
<button onclick="toggleAdmin()">Fechar</button>
</div>
</div>

<script>
const ADMIN_PASSWORD="1234";
const categories=["Todos","Halloween","Aquática","Natalina","Taco","Easter"];
let currentCategory="Todos";
let pets=JSON.parse(localStorage.getItem('pets'))||[];

function toggleAdmin(){
let m=document.getElementById('adminModal');
m.style.display=m.style.display==='flex'?'none':'flex';}

function login(){
if(document.getElementById('password').value===ADMIN_PASSWORD){
document.getElementById('panel').style.display='block';
}else alert('Senha errada');}

function save(){localStorage.setItem('pets',JSON.stringify(pets));}

function renderTabs(){
let tabs=document.getElementById('tabs');
tabs.innerHTML='';
categories.forEach(c=>{
let b=document.createElement('button');
b.innerText=c;
if(c===currentCategory)b.classList.add('active');
b.onclick=()=>{currentCategory=c;render();renderTabs();};
tabs.appendChild(b);
});}

function render(){
let list=document.getElementById('petList');
list.innerHTML='';
let filtered=pets.filter(p=>currentCategory==='Todos'||p.category===currentCategory);

document.getElementById('count').innerText=filtered.length+" pets disponíveis";

filtered.forEach(p=>{
let card=document.createElement('div');
card.className='card';
card.innerHTML=`
<img src="${p.image}">
<h3>${p.name}</h3>
<button class='remove' onclick='removePet(${pets.indexOf(p)})'>Remover</button>
`;
list.appendChild(card);
});}

function addPet(){
let name=document.getElementById('name').value;
let image=document.getElementById('image').value;
let category=document.getElementById('category').value;
if(!name||!image)return alert('preencha tudo');
pets.push({name,image,category});
save();render();}

function removePet(i){pets.splice(i,1);save();render();}

renderTabs();render();
</script>

</body>
</html>
